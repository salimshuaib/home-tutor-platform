<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Delhi Private Tutors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --saffron: #E8751A;
      --navy: #0F1E3C;
      --cream: #FDF8F3;
      --text-dark: #1A1208;
      --white: #FFFFFF;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .admin-container {
      background: var(--white);
      padding: 60px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      max-width: 600px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--navy);
      margin-bottom: 20px;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .btn-logout {
      padding: 12px 24px;
      background: var(--navy);
      color: var(--white);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.3s;
      cursor: pointer;
      border: none;
    }
    .btn-logout:hover {
      background: var(--saffron);
    }
    .logo { height: 45px; width: auto; object-fit: contain; }
</style>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link rel="shortcut icon" href="/assets/logo.png">
</head>
<body>

  <div class="admin-container">
    <h1>Admin Panel</h1>
    <p>Welcome! This is a secure area for administrative control over tutors, students, and platform settings. The UI will be constructed here.</p>
    <button class="btn-logout" onclick="window.location.href='login.html'">Log out</button>
  </div>

</body>
</html>
